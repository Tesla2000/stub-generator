[project]
name = "stub_generator"
version = "0.1.1"
description = "Createst stub files for external packages"
authors = [{name = "Tesla2000", email = "fratajczak124@gmail.com"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic-settings>=2.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stub_generator"]
